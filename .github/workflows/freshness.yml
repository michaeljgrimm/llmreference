name: Data freshness

# Surfaces stale or uncited records so the dataset stays "up to the day" without a
# manual sweep. Runs weekly and on demand; writes the audit to the job summary.
# Read-only — never fails the run on staleness, just reports (uncited published
# data is a hard error in the PR build via `npm run check`-adjacent audit:strict).

on:
  schedule:
    - cron: '0 13 * * 1' # Mondays 13:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Data audit
        run: |
          echo '## LLM Reference — weekly data audit' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/audit-data.mjs >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
